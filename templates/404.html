<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | {{ request.school.name|default:"School Admin" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #2E8B57;
            --soft-gray: #f8fafc;
        }
        body {
            background-color: var(--soft-gray);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 500px;
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary-green);
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.2;
        }
        .btn-home {
            background: var(--primary-green);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-home:hover {
            background: #246e45;
            color: white;
            transform: translateY(-2px);
        }
        .mactech-footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="error-code">404</div>
    <h2 class="fw-bold text-dark mb-3">Lost in the Hallways?</h2>
    <p class="text-muted mb-4">
        The page you are looking for doesn't exist or has been moved. 
        Please check the URL or head back to the dashboard.
    </p>
    
    <div class="mb-4">
        <a href="{% url 'core:index' %}" class="btn-home">
            <i class="fas fa-arrow-left me-2"></i> Return to Portal
        </a>
    </div>

    <div class="mactech-footer">
        <i class="fas fa-shield-alt me-1"></i> System Secured by Mac Technologies
    </div>
</div>

</body>
</html>
