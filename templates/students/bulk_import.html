{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="col-md-6 mx-auto">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white p-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Bulk Student Import</h5>
                <a href="{% url 'students:download_template' %}" class="btn btn-sm btn-outline-light">
                    <i class="fas fa-download me-1"></i> Get Template
                </a>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info small">
                    <i class="fas fa-info-circle me-2"></i> 
                    Please use the template provided to ensure classroom names and columns match the system requirements.
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Excel File (.xlsx)</label>
                        <input type="file" name="excel_file" class="form-control" accept=".xlsx" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-upload me-2"></i> Upload and Import
                        </button>
                        <a href="{% url 'students:student_list' %}" class="btn btn-link text-muted">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
