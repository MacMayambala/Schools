{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | MAC Technologies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ola-green: #1a5c37; --ola-green-light: #2E8B57; --ola-gold: #FFD700; --slate-50: #f8fafc; --slate-200: #e2e8f0; --text-dark: #0f172a; }
        body, html { height: 100%; margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fff; overflow: hidden; }
        .branding-pane { background: linear-gradient(135deg, rgba(26, 92, 55, 0.94), rgba(13, 58, 33, 0.88)), url("{% static 'images/school_bg.jpg' %}"); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 4rem; text-align: center; }
        .logo-box { width: 120px; height: 120px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border-radius: 24px; display: flex; align-items: center; justify-content: center; padding: 15px; margin-bottom: 2rem; border: 1px solid rgba(255, 255, 255, 0.3); }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .login-column { background-color: white; display: flex; align-items: center; justify-content: center; }
        .login-wrapper { width: 100%; max-width: 420px; padding: 2rem; }
        .input-group-custom { background: var(--slate-50); border: 1.5px solid var(--slate-200); border-radius: 14px; display: flex; align-items: center; margin-bottom: 1.25rem; transition: 0.2s; }
        .input-group-custom:focus-within { border-color: var(--ola-green-light); background: white; box-shadow: 0 0 0 4px rgba(46, 139, 87, 0.1); }
        .input-icon { color: #94a3b8; padding: 0 1.2rem; }
        .form-control-custom { border: none; padding: 0.9rem 0; font-weight: 500; background: transparent; width: 100%; outline: none; }
        .btn-authenticate { background: var(--ola-green); color: white; border: none; padding: 1.1rem; border-radius: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; width: 100%; }
        .btn-authenticate:hover { background: #14462a; color: var(--ola-gold); transform: translateY(-2px); }
        .error-box { background: rgba(220, 38, 38, 0.05); color: #dc2626; border-radius: 12px; padding: 12px; font-size: 0.85rem; margin-bottom: 1.5rem; border: 1px solid rgba(220, 38, 38, 0.1); }
        @media (max-width: 768px) { .branding-pane { display: none; } }
    </style>
</head>
<body>
    <div class="container-fluid h-100 p-0">
        <div class="row g-0 h-100">
            <div class="col-md-6 d-none d-md-flex branding-pane">
                <div class="logo-box">
                    <img src="{% static 'images/macfavicon.png' %}" alt="Logo">
                </div>
                <h1 class="display-6 fw-bold">SECURE RECOVERY</h1>
                <p class="mt-2 text-warning fw-light" style="letter-spacing: 2px;">Your Vision, Our Code</p>
            </div>
            <div class="col-md-6 login-column">
                <div class="login-wrapper">
                    <div class="mb-5">
                        <h2 class="fw-bold text-dark mb-1">Forgot Password?</h2>
                        <p class="text-muted">Enter your email to receive a secure reset link.</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        {% if form.email.errors %}
                            <div class="error-box">
                                <i class="fas fa-circle-exclamation me-2"></i>
                                {% for error in form.email.errors %}{{ error }}{% endfor %}
                            </div>
                        {% endif %}

                        <label class="form-label small fw-bold text-uppercase text-muted ms-1">Staff Email Address</label>
                        <div class="input-group-custom">
                            <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" name="email" class="form-control-custom" placeholder="e.g. name@school.com" required>
                        </div>

                        <button type="submit" class="btn btn-authenticate">
                            Send Reset Link <i class="fas fa-paper-plane ms-2 opacity-50"></i>
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{% url 'core:login' %}" class="small text-decoration-none fw-bold text-success">
                            <i class="fas fa-arrow-left me-1"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
